name: Deploy to tpr.20100706.xyz/xgkb/

on:
  push:
    branches: [main, claude/project-overview-t2y8ql]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install & Build
        run: npm ci && npm run build

      - name: Prepare staging dir on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.XGKB_VPS_HOST }}
          port: ${{ secrets.XGKB_VPS_PORT }}
          username: ${{ secrets.XGKB_VPS_USER }}
          password: ${{ secrets.XGKB_VPS_PASSWORD }}
          script: mkdir -p /tmp/xgkb-deploy /var/www/xgkb-explorer

      - name: Upload dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.XGKB_VPS_HOST }}
          port: ${{ secrets.XGKB_VPS_PORT }}
          username: ${{ secrets.XGKB_VPS_USER }}
          password: ${{ secrets.XGKB_VPS_PASSWORD }}
          source: "dist/"
          target: "/tmp/xgkb-deploy"
          strip_components: 1

      - name: Deploy files only (Caddy owns web server config)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.XGKB_VPS_HOST }}
          port: ${{ secrets.XGKB_VPS_PORT }}
          username: ${{ secrets.XGKB_VPS_USER }}
          password: ${{ secrets.XGKB_VPS_PASSWORD }}
          script: |
            set -e
            XGKB_DIR="/var/www/xgkb-explorer"
            echo ">>> Deploy dir: $XGKB_DIR"
            cp -r /tmp/xgkb-deploy/* "$XGKB_DIR/"
            rm -rf /tmp/xgkb-deploy
            echo ">>> Files deployed."
            echo ">>> Caddy serves HTTPS + API proxy; workflow does not modify web server config."
            echo ">>> Deployment complete: https://tpr.20100706.xyz/xgkb/"
