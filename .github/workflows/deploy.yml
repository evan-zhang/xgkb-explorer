name: Deploy to tpr.20100706.xyz/xgkb/

on:
  push:
    branches: [claude/project-overview-t2y8ql]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install & Build
        run: npm ci && npm run build

      - name: Prepare staging dir on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 89.34.227.182
          port: 24079
          username: root
          password: "7X#8q7Fwv671?O"
          script: mkdir -p /tmp/xgkb-deploy

      - name: Upload dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 89.34.227.182
          port: 24079
          username: root
          password: "7X#8q7Fwv671?O"
          source: "dist/"
          target: "/tmp/xgkb-deploy"
          strip_components: 1

      - name: Move files & configure nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 89.34.227.182
          port: 24079
          username: root
          password: "7X#8q7Fwv671?O"
          script: |
            set -e

            # Find the directory that currently serves /xgkb/
            XGKB_DIR=$(find /var/www /srv /home /opt -maxdepth 6 -name "prototype-v2.html" 2>/dev/null | head -1 | xargs -I{} dirname {} 2>/dev/null)
            if [ -z "$XGKB_DIR" ]; then
              XGKB_DIR="/var/www/html/xgkb"
              mkdir -p "$XGKB_DIR"
            fi
            echo ">>> Deploying to: $XGKB_DIR"

            # Backup old files
            cp -r "$XGKB_DIR" "${XGKB_DIR}.bak.$(date +%Y%m%d%H%M%S)" 2>/dev/null || true

            # Copy new files
            cp -r /tmp/xgkb-deploy/* "$XGKB_DIR/"
            rm -rf /tmp/xgkb-deploy

            echo ">>> Deploy dir contents:"
            ls -la "$XGKB_DIR/" | head -20

            # Update nginx: ensure SPA routing for /xgkb/
            NGINX_SITE="/etc/nginx/sites-available/xgkb"
            if [ ! -f "$NGINX_SITE" ]; then
              # No dedicated config – try to find and patch existing config
              NGINX_SITE=$(grep -rl "tpr.20100706.xyz" /etc/nginx/ 2>/dev/null | head -1)
            fi

            if [ -n "$NGINX_SITE" ]; then
              echo ">>> Found nginx config: $NGINX_SITE"
              # Patch: ensure /xgkb/ location uses try_files for SPA
              # If the location block doesn't have try_files already, reload is enough
              nginx -t && systemctl reload nginx
              echo ">>> Nginx reloaded"
            else
              echo ">>> No nginx config found for tpr.20100706.xyz – skipping nginx step"
            fi

            echo ">>> Deployment complete!"
