name: Deploy to tpr.20100706.xyz/xgkb/

on:
  push:
    branches: [claude/project-overview-t2y8ql]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install & Build
        run: npm ci && npm run build

      - name: Prepare staging dir on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 89.34.227.182
          port: 24079
          username: root
          password: ${{ secrets.VPS_PASS }}
          script: mkdir -p /tmp/xgkb-deploy

      - name: Upload dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 89.34.227.182
          port: 24079
          username: root
          password: ${{ secrets.VPS_PASS }}
          source: "dist/"
          target: "/tmp/xgkb-deploy"
          strip_components: 1

      - name: Move files & configure nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 89.34.227.182
          port: 24079
          username: root
          password: ${{ secrets.VPS_PASS }}
          script: |
            set -e

            # Find the directory that currently serves /xgkb/
            XGKB_DIR=$(find /var/www /srv /home /opt -maxdepth 6 -name "prototype-v2.html" 2>/dev/null | head -1 | xargs -I{} dirname {} 2>/dev/null)
            if [ -z "$XGKB_DIR" ]; then
              XGKB_DIR="/var/www/html/xgkb"
              mkdir -p "$XGKB_DIR"
            fi
            echo ">>> Deploying to: $XGKB_DIR"

            # Back up old files
            cp -r "$XGKB_DIR" "${XGKB_DIR}.bak.$(date +%Y%m%d%H%M%S)" 2>/dev/null || true

            # Copy new files
            cp -r /tmp/xgkb-deploy/* "$XGKB_DIR/"
            rm -rf /tmp/xgkb-deploy

            # Ensure nginx has try_files for SPA at /xgkb/
            NGINX_SITE="/etc/nginx/sites-available/xgkb"
            NGINX_ROOT=$(dirname "$XGKB_DIR")

            cat > "$NGINX_SITE" << NGINXEOF
            server {
                listen 80;
                listen [::]:80;
                server_name tpr.20100706.xyz;
                return 301 https://\$host\$request_uri;
            }

            server {
                listen 443 ssl;
                listen [::]:443 ssl;
                server_name tpr.20100706.xyz;

                # SSL certs (certbot will manage these)
                ssl_certificate     /etc/letsencrypt/live/tpr.20100706.xyz/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/tpr.20100706.xyz/privkey.pem;
                include /etc/letsencrypt/options-ssl-nginx.conf;
                ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

                root $NGINX_ROOT;

                # React SPA under /xgkb/
                location /xgkb/ {
                    alias $XGKB_DIR/;
                    index index.html;
                    try_files \$uri \$uri/ /xgkb/index.html;
                }

                # Keep serving other paths (existing prototype files etc.)
                location / {
                    try_files \$uri \$uri/ =404;
                }

                location /assets/ {
                    alias $XGKB_DIR/assets/;
                    expires 1y;
                    add_header Cache-Control "public, immutable";
                }

                gzip on;
                gzip_types text/plain text/css application/javascript application/json image/svg+xml;
            }
            NGINXEOF

            ln -sf "$NGINX_SITE" /etc/nginx/sites-enabled/xgkb 2>/dev/null || true
            nginx -t && systemctl reload nginx

            echo ">>> Deployment complete: https://tpr.20100706.xyz/xgkb/"
