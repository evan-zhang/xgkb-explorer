version: 1
project: xgkb-explorer
updated: 2026-06-23
workflow: AODW-Next
modules:
  - name: app-shell
    path: docs/modules/app-shell.md
    root: src
    related_files:
      - src/App.tsx
      - src/main.tsx
  - name: auth
    path: docs/modules/auth.md
    root: src/lib
    related_files:
      - src/lib/auth.ts
      - src/components/DingTalkLogin.tsx
    owns:
      - DingTalk/Cwork auth flow
      - local auth session persistence
      - callback parsing and SDK loading
    invariants:
      - unauthenticated users must not enter the app shell
      - VITE_CWORK_APP_CODE is required for login APIs
      - do not commit auth tokens
    verify:
      - npm run build
      - login/logout smoke test
  - name: config
    path: docs/modules/config.md
    root: src/lib
    related_files:
      - src/lib/config.ts
      - src/lib/settings.ts
      - src/components/ConfigModal.tsx
    owns:
      - localStorage schema
      - user settings cloud sync cache
      - AppKey/server URL/preview mode persistence
      - directory entries and migration
    invariants:
      - never commit real AppKeys
      - migrations must preserve existing localStorage users
      - SpaceEntry uses directoryId; empty directoryId means current user's visible projects
      - apiMode, serverUrl, and appKey remain local-only; do not upload them to settings API
    verify:
      - npm run build
      - switch AppKey and confirm projectId reloads
  - name: api-client
    path: docs/modules/api-client.md
    root: src/lib
    related_files:
      - src/lib/api.ts
      - src/lib/types.ts
  - name: data-hooks
    path: docs/modules/data-hooks.md
    root: src/lib
    related_files:
      - src/lib/hooks.ts
    owns:
      - project id state
      - directory-id loading
      - file content loading
      - README/index preview lookup
    invariants:
      - projectId is tied to current client
      - empty directoryId loads visible projects through findAllProjects
      - non-empty directoryId loads via getChildFiles(directoryId)
    verify:
      - npm run build
      - switch between two AppKeys
  - name: project-ui
    path: docs/modules/project-ui.md
    root: src/components
    related_files:
      - src/components/ProjectsHub.tsx
      - src/components/ProjectDetail.tsx
      - src/components/FileTree.tsx
      - src/components/FileExplorer.tsx
      - src/components/ContextMenu.tsx
  - name: preview
    path: docs/modules/preview.md
    root: src
    related_files:
      - src/lib/preview.ts
      - src/components/FilePreview.tsx
      - src/components/FileViewerModal.tsx
  - name: deployment
    path: docs/modules/deployment.md
    root: .
    related_files:
      - deploy.sh
      - .github/workflows/deploy.yml
      - DEPLOYMENT.md
      - docs/runbook.md
